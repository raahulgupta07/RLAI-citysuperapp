version: '3.8'

services:
  superapp:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - superapp-data:/app/frontend/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  superapp-data:
    name: city-gpt-superapp-data
